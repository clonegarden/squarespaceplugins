<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quotation Builder — Demo</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{width:100%;min-height:100vh;font-family:system-ui,sans-serif;background:#f8f9fb;color:#111;overflow:auto}
    .page-header{background:#fff;border-bottom:1px solid #eee;padding:28px 40px}
    .page-header h1{font-size:20px;font-weight:600;letter-spacing:-0.01em;margin-bottom:4px}
    .page-header p{color:#aaa;font-size:13px}
    .content{padding:40px 32px 80px;max-width:760px;margin:0 auto}
  </style>
</head>
<body>
  <div class="page-header">
    <h1>Quotation Builder</h1>
    <p>Interactive quote configurator for services</p>
  </div>
  <div class="content">
    <div data-anavo-quotation></div>
  </div>
  <script>
  (function(){
    var p = new URLSearchParams(location.search);
    var g = function(k,d){ return p.has(k) ? p.get(k) : d; };
    var u = new URL('https://cdn.jsdelivr.net/gh/clonegarden/squarespaceplugins@latest/quotation-builder/quotation-builder.min.js');
    u.searchParams.set('domain','anavo.tech');
    u.searchParams.set('accentColor', g('accentColor','#1a3a5c'));
    var s = document.createElement('script');
    s.src = u.toString();
    document.body.appendChild(s);
  })();
  </script>
</body>
</html>
