<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Countdown Timer — Demo</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{width:100%;height:100vh;overflow:hidden;font-family:system-ui,sans-serif;background:#1a1430}
    .page{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;gap:24px;padding:32px;text-align:center}
    .eyebrow{font-size:11px;font-weight:600;letter-spacing:0.2em;text-transform:uppercase;color:rgba(255,255,255,0.3)}
    .hint{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);font-size:11px;color:#444;background:rgba(255,255,255,0.04);padding:6px 14px;border-radius:20px;border:1px solid rgba(255,255,255,0.1);pointer-events:none;z-index:9999}
  </style>
</head>
<body>
  <div class="page">
    <div class="eyebrow">Launching in</div>
    <div data-anavo-countdown></div>
  </div>
  <div class="hint">Live countdown to 2026-12-31</div>
  <script>
  (function(){
    var p = new URLSearchParams(location.search);
    var g = function(k,d){ return p.has(k) ? p.get(k) : d; };
    var u = new URL('https://cdn.jsdelivr.net/gh/clonegarden/squarespaceplugins@latest/simplecountdown/simple-countdown-timer.min.js');
    u.searchParams.set('domain','anavo.tech');
    u.searchParams.set('targetDate', g('targetDate','2026-12-31T23:59:59'));
    u.searchParams.set('textColor', g('textColor','#762323'));
    u.searchParams.set('accentColor', g('accentColor','#2a284d'));
    u.searchParams.set('fontSize', g('fontSize','60'));
    u.searchParams.set('showLabels', g('showLabels','true'));
    var s = document.createElement('script');
    s.src = u.toString();
    document.body.appendChild(s);
  })();
  </script>
</body>
</html>
