<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Split Hover — Demo</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{width:100%;height:100vh;overflow:hidden;font-family:system-ui,sans-serif;background:#1a1a1a}
    .hint{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);font-size:11px;color:rgba(255,255,255,0.3);background:rgba(255,255,255,0.05);padding:6px 14px;border-radius:20px;border:1px solid rgba(255,255,255,0.08);pointer-events:none;z-index:9999}
  </style>
</head>
<body>
  <div data-anavo-split-hover></div>
  <div class="hint">↑ Move mouse left/right to reveal each side</div>
  <script>
  (function(){
    var p = new URLSearchParams(location.search);
    var g = function(k,d){ return p.has(k) ? p.get(k) : d; };
    var u = new URL('https://cdn.jsdelivr.net/gh/clonegarden/squarespaceplugins@latest/split-hover/split-hover.min.js');
    u.searchParams.set('domain','anavo.tech');
    u.searchParams.set('noun1', g('noun1','FASHION'));
    u.searchParams.set('noun2', g('noun2','EDITORIAL'));
    u.searchParams.set('color1', g('color1','#1a1a1a'));
    u.searchParams.set('color2', g('color2','#f5f0e8'));
    u.searchParams.set('fontColor', g('fontColor','#ffffff'));
    u.searchParams.set('separator', g('separator','/'));
    u.searchParams.set('image1', g('image1','https://images.unsplash.com/photo-1531746020798-e6953c6e8e04?w=400&h=600&fit=crop'));
    u.searchParams.set('image2', g('image2','https://images.unsplash.com/photo-1494790108755-2616b612b5ee?w=400&h=600&fit=crop'));
    var s = document.createElement('script');
    s.src = u.toString();
    document.body.appendChild(s);
  })();
  </script>
</body>
</html>
