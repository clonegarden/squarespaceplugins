<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nav FX — Demo</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{width:100%;min-height:100vh;font-family:system-ui,sans-serif;background:#0a0a0a;color:#fff}
    .page{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:0}
    .logo{position:fixed;top:28px;left:40px;font-size:13px;font-weight:700;letter-spacing:0.15em;text-transform:uppercase;color:rgba(255,255,255,0.3)}
    nav{display:flex;flex-direction:column;align-items:center;gap:8px}
    nav a[data-anavo-navfx]{display:block;font-size:clamp(36px,7vw,80px);font-weight:900;letter-spacing:-0.03em;text-decoration:none;color:#fff;line-height:1.05;cursor:pointer;transition:opacity 0.15s}
    nav a[data-anavo-navfx]:hover{opacity:0.85}
    .hint{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);font-size:11px;color:#444;background:rgba(255,255,255,0.04);padding:6px 14px;border-radius:20px;border:1px solid rgba(255,255,255,0.08);pointer-events:none;z-index:9999}
  </style>
</head>
<body>
  <div class="page">
    <span class="logo">Nav FX</span>
    <nav>
      <a href="#" data-anavo-navfx>Home</a>
      <a href="#" data-anavo-navfx>About</a>
      <a href="#" data-anavo-navfx>Work</a>
      <a href="#" data-anavo-navfx>Studio</a>
      <a href="#" data-anavo-navfx>Contact</a>
    </nav>
  </div>
  <div class="hint">↑ Hover links to see 3D FX</div>
  <script>
  (function(){
    var p = new URLSearchParams(location.search);
    var g = function(k,d){ return p.has(k) ? p.get(k) : d; };
    var u = new URL('https://cdn.jsdelivr.net/gh/clonegarden/squarespaceplugins@latest/nav-fx/nav-fx.min.js');
    u.searchParams.set('domain','anavo.tech');
    u.searchParams.set('style', g('style','3d'));
    u.searchParams.set('accent1', g('accent1','#ff1744'));
    u.searchParams.set('accent2', g('accent2','#4dd0e1'));
    u.searchParams.set('fontWeight', g('fontWeight','900'));
    u.searchParams.set('glowColor', g('glowColor','#d83bff'));
    u.searchParams.set('selector', g('selector','[data-anavo-navfx]'));
    var s = document.createElement('script');
    s.src = u.toString();
    document.body.appendChild(s);
  })();
  </script>
</body>
</html>
