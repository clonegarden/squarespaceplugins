<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image Tilt — Demo</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{width:100%;min-height:100vh;font-family:system-ui,sans-serif;background:#fff;color:#111}
    .page{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:48px 24px;gap:40px}
    .page-header{text-align:center}
    .page-header h1{font-size:clamp(20px,3.5vw,36px);font-weight:300;letter-spacing:-0.01em;margin-bottom:8px}
    .page-header p{color:#aaa;font-size:13px}
    .images-row{display:flex;gap:24px;align-items:center;justify-content:center;flex-wrap:wrap}
    .images-row img[data-anavo-tilt]{width:clamp(100px,28vw,200px);height:clamp(130px,35vw,250px);object-fit:cover;border-radius:4px;cursor:pointer;display:block}
    .hint{font-size:11px;color:#aaa;text-align:center}
  </style>
</head>
<body>
  <div class="page">
    <div class="page-header">
      <h1>Image Tilt</h1>
      <p>Parallax depth effect on hover</p>
    </div>
    <div class="images-row">
      <img data-anavo-tilt src="https://images.unsplash.com/photo-1531746020798-e6953c6e8e04?w=400&h=500&fit=crop" alt="Portrait 1">
      <img data-anavo-tilt src="https://images.unsplash.com/photo-1494790108755-2616b612b5ee?w=400&h=500&fit=crop" alt="Portrait 2">
      <img data-anavo-tilt src="https://images.unsplash.com/photo-1438761681033-6461ffad8d80?w=400&h=500&fit=crop" alt="Portrait 3">
    </div>
    <div class="hint">↑ Hover images to see tilt effect</div>
  </div>
  <script>
  (function(){
    var p = new URLSearchParams(location.search);
    var g = function(k,d){ return p.has(k) ? p.get(k) : d; };
    var u = new URL('https://cdn.jsdelivr.net/gh/clonegarden/squarespaceplugins@latest/image-tilt/image-tilt.min.js');
    u.searchParams.set('domain','anavo.tech');
    u.searchParams.set('layers', g('layers','3'));
    u.searchParams.set('opacity', g('opacity','0.7'));
    u.searchParams.set('translateX', g('translateX','10'));
    u.searchParams.set('translateY', g('translateY','10'));
    u.searchParams.set('perspective', g('perspective','1000'));
    var s = document.createElement('script');
    s.src = u.toString();
    document.body.appendChild(s);
  })();
  </script>
</body>
</html>
