<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chandelier — Demo</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{width:100%;height:100vh;overflow:hidden;font-family:system-ui,sans-serif;background:#191919}
    .center-text{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none;user-select:none;gap:10px}
    .center-text span{font-size:clamp(12px,2vw,18px);font-weight:300;letter-spacing:0.3em;text-transform:uppercase;color:rgba(255,255,255,0.12)}
    .hint{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);font-size:11px;color:#444;background:rgba(255,255,255,0.04);padding:6px 14px;border-radius:20px;border:1px solid rgba(255,255,255,0.08);pointer-events:none;z-index:9999}
  </style>
</head>
<body>
  <div class="center-text">
    <span>Chandelier</span>
    <span style="font-size:11px;letter-spacing:0.2em">Particle constellation</span>
  </div>
  <div data-anavo-chandelier></div>
  <div class="hint">↑ Move mouse to disturb the chandelier</div>
  <script>
  (function(){
    var p = new URLSearchParams(location.search);
    var g = function(k,d){ return p.has(k) ? p.get(k) : d; };
    var u = new URL('https://cdn.jsdelivr.net/gh/clonegarden/squarespaceplugins@latest/chandelier/chandelier.min.js');
    u.searchParams.set('domain','anavo.tech');
    u.searchParams.set('bgColor', g('bgColor','#191919'));
    u.searchParams.set('particleColor', g('particleColor','255,255,255'));
    u.searchParams.set('lineColor', g('lineColor','255,215,0'));
    u.searchParams.set('particleCount', g('particleCount','200'));
    u.searchParams.set('mouseRadius', g('mouseRadius','150'));
    var s = document.createElement('script');
    s.src = u.toString();
    document.body.appendChild(s);
  })();
  </script>
</body>
</html>
