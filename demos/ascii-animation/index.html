<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ASCII Animation — Demo</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{width:100%;height:100vh;overflow:hidden;font-family:monospace;background:#000000}
    .hint{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);font-size:11px;color:#333;background:rgba(255,255,255,0.04);padding:6px 14px;border-radius:20px;border:1px solid rgba(255,255,255,0.08);pointer-events:none;z-index:9999}
  </style>
</head>
<body>
  <div data-anavo-ascii></div>
  <div class="hint">↑ Click to trigger explosion — ASCII rain enabled</div>
  <script>
  (function(){
    var p = new URLSearchParams(location.search);
    var u = new URL('https://cdn.jsdelivr.net/gh/clonegarden/squarespaceplugins@latest/ascii-animation/ascii-animation.min.js');
    u.searchParams.set('domain','anavo.tech');
    var PX_PARAMS = {};
    var addPx = function(v){ return /px$|%$|em$|rem$|vw$/.test(v) ? v : v + 'px'; };
    p.forEach(function(val, key){ if (PX_PARAMS[key]) val = addPx(val); u.searchParams.set(key, val); });
    var s = document.createElement('script');
    s.src = u.toString();
    document.body.appendChild(s);
  })();
  </script>
</body>
</html>
