<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Distorted Links — Demo</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{width:100%;min-height:100vh;font-family:system-ui,sans-serif;background:#fff;color:#111}
    .page{display:flex;flex-direction:column;min-height:100vh}
    .top-bar{padding:28px 48px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #eee}
    .top-bar .logo{font-size:13px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:#111}
    .top-bar .tagline{font-size:12px;color:#aaa}
    .nav-area{flex:1;display:flex;flex-direction:column;justify-content:center;padding:40px 48px;gap:4px}
    nav a[data-anavo-distort]{display:block;font-size:clamp(32px,6vw,72px);font-weight:300;letter-spacing:-0.02em;color:#111;text-decoration:none;line-height:1.1;cursor:pointer;position:relative}
    .bottom-bar{padding:24px 48px;display:flex;align-items:center;justify-content:space-between;border-top:1px solid #eee}
    .bottom-bar span{font-size:12px;color:#aaa}
    .hint{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);font-size:11px;color:#aaa;background:#f9f9f9;padding:6px 14px;border-radius:20px;border:1px solid #eee;pointer-events:none;z-index:9999}
  </style>
</head>
<body>
  <div class="page">
    <div class="top-bar">
      <span class="logo">Studio</span>
      <span class="tagline">Design &amp; Development</span>
    </div>
    <div class="nav-area">
      <nav>
        <a href="#" data-anavo-distort>Home</a>
        <a href="#" data-anavo-distort>About</a>
        <a href="#" data-anavo-distort>Work</a>
        <a href="#" data-anavo-distort>Services</a>
        <a href="#" data-anavo-distort>Contact</a>
      </nav>
    </div>
    <div class="bottom-bar">
      <span>New York — Tokyo</span>
      <span>2024</span>
    </div>
  </div>
  <div class="hint">↑ Hover links to see distortion effect</div>
  <script>
  (function(){
    var p = new URLSearchParams(location.search);
    var g = function(k,d){ return p.has(k) ? p.get(k) : d; };
    var u = new URL('https://cdn.jsdelivr.net/gh/clonegarden/squarespaceplugins@latest/distorted-links/distorted-links.min.js');
    u.searchParams.set('domain','anavo.tech');
    u.searchParams.set('effect', g('effect','turbulence'));
    u.searchParams.set('showLine', g('showLine','true'));
    u.searchParams.set('lineWidth', g('lineWidth','2'));
    u.searchParams.set('color', g('color','#111111'));
    var s = document.createElement('script');
    s.src = u.toString();
    document.body.appendChild(s);
  })();
  </script>
</body>
</html>
